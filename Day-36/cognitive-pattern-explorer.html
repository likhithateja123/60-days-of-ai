<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cognitive Pattern Explorer</title>
<style>
  :root{
    --bg:#0f1116; --panel:#181b24; --panel2:#20232f; --border:#2b2f3f;
    --text:#e9ecf3; --muted:#9aa1b4; --accent:#7c9cff; --accent2:#8ef0d6;
    --good:#7fe0b0; --warn:#f2c76b;
  }
  [data-mode="stress"]{
    --bg:#12100f; --panel:#1c1815; --panel2:#251f1a; --border:#392f26;
    --text:#f4ede4; --muted:#b8a693; --accent:#e0955a; --accent2:#f2c76b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Segoe UI',Arial,sans-serif;background:radial-gradient(circle at top,var(--panel2),var(--bg) 65%);
    color:var(--text);min-height:100vh;transition:background .5s ease,color .5s ease;
  }
  #app{max-width:880px;margin:0 auto;padding:24px 16px 80px;}
  .card{
    background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:26px;
    margin-bottom:20px;box-shadow:0 12px 32px rgba(0,0,0,.35);animation:fadeIn .5s ease;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  h1{font-size:1.8rem;margin:0 0 8px;font-weight:600;background:linear-gradient(90deg,var(--accent),var(--accent2));
     -webkit-background-clip:text;background-clip:text;color:transparent;}
  h2{font-size:1.25rem;margin:0 0 10px;font-weight:600;}
  h3{font-size:1rem;margin:0 0 8px;color:var(--accent2);font-weight:600;}
  p{color:var(--muted);line-height:1.65;margin:0 0 12px;}
  .btn{
    background:var(--accent);color:#0c0d12;border:none;padding:12px 22px;border-radius:12px;
    font-size:.95rem;font-weight:600;cursor:pointer;margin:6px 8px 6px 0;transition:transform .15s,filter .15s;
  }
  .btn:hover{filter:brightness(1.1);transform:translateY(-2px);}
  .btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
  .btn.secondary{background:var(--panel2);border:1px solid var(--border);color:var(--text);}
  .btn:focus-visible, .choice:focus-visible, .card-item:focus-visible, .slot:focus-visible{
    outline:2px solid var(--accent2); outline-offset:2px;
  }
  .top-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:18px;}
  .mode-toggle{display:flex;gap:8px;}
  .mode-btn{
    background:var(--panel2);border:1px solid var(--border);color:var(--muted);padding:8px 14px;border-radius:20px;
    cursor:pointer;font-size:.82rem;transition:border .15s,color .15s;
  }
  .mode-btn.active{border-color:var(--accent2);color:var(--text);}
  .progress-wrap{margin-bottom:20px;}
  .progress-label{display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-bottom:6px;}
  .progress-bar{height:8px;background:var(--panel2);border-radius:6px;overflow:hidden;border:1px solid var(--border);}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .45s ease;}

  .choice-list{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
  .choice{
    background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;
    transition:border .15s,transform .15s;
  }
  .choice:hover{border-color:var(--accent);transform:translateX(3px);}
  .choice.selected{border-color:var(--accent2);background:#242a3a;}

  .drag-area{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:14px;}
  @media (max-width:640px){.drag-area{grid-template-columns:1fr;}}
  .zone{background:var(--panel2);border:1px dashed var(--border);border-radius:14px;padding:14px;min-height:200px;}
  .zone.dragover{border-color:var(--accent2);background:#242c38;}
  .zone-title{font-size:.75rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px;}
  .card-item{
    background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px;
    cursor:grab;font-size:.9rem;touch-action:none;user-select:none;transition:border .15s, box-shadow .15s;
  }
  .card-item:active{cursor:grabbing;}
  .card-item.dragging{opacity:.5;box-shadow:0 0 0 2px var(--accent2);}
  .card-item .kb-controls{display:flex;gap:6px;margin-top:8px;}
  .kb-btn{
    background:var(--panel2);border:1px solid var(--border);color:var(--muted);border-radius:6px;
    padding:3px 8px;font-size:.75rem;cursor:pointer;
  }
  .kb-btn:hover{color:var(--text);border-color:var(--accent2);}

  .timeline{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
  .slot{
    background:var(--panel2);border:1px dashed var(--border);border-radius:12px;padding:12px 14px;min-height:52px;
    display:flex;align-items:center;gap:10px;
  }
  .slot .slot-index{font-weight:700;color:var(--accent2);min-width:24px;}
  .slot.filled{border-style:solid;}
  .slot.dragover{border-color:var(--accent2);}

  .journal-textarea{
    width:100%;min-height:100px;background:var(--panel2);border:1px solid var(--border);color:var(--text);
    padding:12px 14px;border-radius:12px;font-family:inherit;font-size:.92rem;resize:vertical;
  }
  .breakdown{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:14px;}
  .style-box{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:14px;}
  .style-box .style-name{font-size:.85rem;color:var(--text);font-weight:600;margin-bottom:6px;}
  .bar-bg{height:8px;background:var(--panel);border-radius:6px;overflow:hidden;border:1px solid var(--border);margin-bottom:6px;}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .6s ease;}
  .style-pct{font-size:.8rem;color:var(--muted);}
  .report-section{border-left:3px solid var(--accent);padding-left:14px;margin-bottom:16px;}
  .tag{display:inline-block;background:var(--panel2);border:1px solid var(--border);color:var(--accent2);
    padding:3px 10px;border-radius:20px;font-size:.75rem;margin:3px 4px 3px 0;}
  .center{text-align:center;}
  .muted-small{font-size:.8rem;color:var(--muted);}
  .intro-box{
    background:linear-gradient(135deg, rgba(124,156,255,.08), rgba(142,240,214,.05));
    border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;
  }
  @media (max-width:520px){h1{font-size:1.4rem;} .card{padding:18px;}}
</style>
</head>
<body data-mode="calm">
<div id="app"></div>

<script>
(function(){
"use strict";

/* ================= DATA ================= */

var STYLES = ["Analytical Thinker","Emotional Intuitive","Overthinking Loop","Action-First Decision Maker","Balanced Reflective Thinker"];

var CHAPTER1_SCENARIOS = [
  {
    prompt:"You receive an email with unclear instructions for an important task. What's your first instinct?",
    options:[
      {text:"Break the email down line by line to identify exactly what's being asked.", style:"Analytical Thinker"},
      {text:"Notice a slight unease and reply to check how the sender is feeling about the task.", style:"Emotional Intuitive"},
      {text:"Reread it several times, imagining different ways it could go wrong.", style:"Overthinking Loop"},
      {text:"Just start on the parts that seem obvious and adjust as you go.", style:"Action-First Decision Maker"},
      {text:"Note what's unclear, ask one clarifying question, then proceed.", style:"Balanced Reflective Thinker"}
    ]
  },
  {
    prompt:"A plan you were excited about falls through unexpectedly. How does your mind respond?",
    options:[
      {text:"Immediately list out alternative options and their trade-offs.", style:"Analytical Thinker"},
      {text:"Sit with the disappointment for a while before thinking about next steps.", style:"Emotional Intuitive"},
      {text:"Replay what went wrong over and over, searching for where you could have prevented it.", style:"Overthinking Loop"},
      {text:"Pivot to a new plan almost right away without dwelling on it.", style:"Action-First Decision Maker"},
      {text:"Acknowledge the disappointment, then calmly consider what to try next.", style:"Balanced Reflective Thinker"}
    ]
  },
  {
    prompt:"You're asked to make a decision with incomplete information. What happens next?",
    options:[
      {text:"Gather as much data as you can before committing to anything.", style:"Analytical Thinker"},
      {text:"Go with what feels right, trusting your gut reaction.", style:"Emotional Intuitive"},
      {text:"Feel stuck weighing every possible outcome without landing on one.", style:"Overthinking Loop"},
      {text:"Make a quick call so momentum doesn't stall.", style:"Action-First Decision Maker"},
      {text:"Weigh the key factors briefly, then decide with reasonable confidence.", style:"Balanced Reflective Thinker"}
    ]
  },
  {
    prompt:"Someone gives you feedback that catches you off guard. What's your internal reaction?",
    options:[
      {text:"Analyze the feedback for specific, actionable points.", style:"Analytical Thinker"},
      {text:"Feel the emotional weight of it first, before thinking about content.", style:"Emotional Intuitive"},
      {text:"Turn the comment over in your mind for the rest of the day.", style:"Overthinking Loop"},
      {text:"Decide quickly what to change and move on.", style:"Action-First Decision Maker"},
      {text:"Notice your reaction, then reflect calmly on what's useful in it.", style:"Balanced Reflective Thinker"}
    ]
  },
  {
    prompt:"You have a free hour with nothing planned. What do you tend to do with it?",
    options:[
      {text:"Use it productively — organize, plan, or research something useful.", style:"Analytical Thinker"},
      {text:"Follow whatever you're feeling drawn to in the moment.", style:"Emotional Intuitive"},
      {text:"Spend part of it thinking about unrelated worries or 'what ifs'.", style:"Overthinking Loop"},
      {text:"Jump straight into a task you've been meaning to finish.", style:"Action-First Decision Maker"},
      {text:"Rest a little, then choose one thing to do intentionally.", style:"Balanced Reflective Thinker"}
    ]
  },
  {
    prompt:"A conflict comes up between you and someone close to you. How do you typically engage with it?",
    options:[
      {text:"Try to logically map out where the misunderstanding started.", style:"Analytical Thinker"},
      {text:"Focus first on how both of you are feeling in the moment.", style:"Emotional Intuitive"},
      {text:"Keep rehearsing what you should have said differently.", style:"Overthinking Loop"},
      {text:"Address it directly and quickly so it doesn't linger.", style:"Action-First Decision Maker"},
      {text:"Give it a little space, then approach the conversation thoughtfully.", style:"Balanced Reflective Thinker"}
    ]
  }
];

var PRIORITY_CARDS = [
  "Getting things done efficiently",
  "Understanding how I feel about a situation",
  "Making sure I haven't missed anything",
  "Moving forward quickly",
  "Staying calm and grounded while deciding"
];

var TIMELINE_STEPS = [
  {id:"notice", text:"Notice the situation or trigger"},
  {id:"feel", text:"Register an initial feeling or reaction"},
  {id:"think", text:"Think through possible interpretations"},
  {id:"weigh", text:"Weigh options or considerations"},
  {id:"decide", text:"Arrive at a decision or response"}
];

/* ================= STATE ================= */

var state = {
  mode:"calm",
  step:"welcome", // welcome -> ch1-intro -> ch1 -> ch2-intro -> ch2 -> ch3-intro -> ch3 -> journal -> report
  ch1Index:0,
  ch1Answers:[], // list of style strings
  ch2Pool:[], ch2Placed:[],
  ch3Pool:[], ch3Slots:[null,null,null,null,null],
  journal:{ text1:"", text2:"", text3:"" },
  dragState:null // for pointer-based dragging
};

var STEP_ORDER = ["welcome","ch1-intro","ch1","ch2-intro","ch2","ch3-intro","ch3","journal","report"];

function esc(s){ var d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
function shuffle(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; }
  return a;
}

/* ================= RENDER HELPERS ================= */

function progressPct(){
  var idx = STEP_ORDER.indexOf(state.step);
  return Math.round((idx/(STEP_ORDER.length-1))*100);
}
function stepLabel(){
  var labels = {
    "welcome":"Welcome","ch1-intro":"Chapter 1: Intro","ch1":"Chapter 1: Thinking Scenarios",
    "ch2-intro":"Chapter 2: Intro","ch2":"Chapter 2: Priority Cards",
    "ch3-intro":"Chapter 3: Intro","ch3":"Chapter 3: Thinking Timeline",
    "journal":"Reflection Journal","report":"Your Cognitive Pattern Report"
  };
  return labels[state.step] || "";
}

function renderTopBar(){
  var html = '<div class="top-bar">';
  html += '<div><strong>Cognitive Pattern Explorer</strong></div>';
  html += '<div class="mode-toggle" role="group" aria-label="Select calm or stress mode">' +
    '<button class="mode-btn' + (state.mode==="calm"?" active":"") + '" id="calmModeBtn">🌿 Calm Mode</button>' +
    '<button class="mode-btn' + (state.mode==="stress"?" active":"") + '" id="stressModeBtn">🔥 Stress Mode</button>' +
    '</div></div>';
  return html;
}

function renderProgress(){
  if(state.step==="welcome") return "";
  var pct = progressPct();
  return '<div class="progress-wrap"><div class="progress-label"><span>' + stepLabel() + '</span><span>' + pct + '%</span></div>' +
    '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%;"></div></div></div>';
}

/* ================= STEP RENDERERS ================= */

function renderWelcome(){
  return '<div class="card center">' +
    '<h1>Cognitive Pattern Explorer</h1>' +
    '<p>A calm space to explore how you tend to think, feel, and decide — not a test, not a diagnosis, just a gentle mirror. Move through three short chapters and a reflection journal at your own pace.</p>' +
    '<p class="muted-small">This experience uses reflective language only. It does not assess or diagnose mental health in any way.</p>' +
    '<button class="btn" id="startBtn">Begin the Exploration</button>' +
    '</div>';
}

function renderCh1Intro(){
  return '<div class="card">' +
    '<div class="intro-box">' +
    '<h3>Chapter 1: Interactive Thinking Scenarios</h3>' +
    '<p>You\'ll read a handful of everyday situations and pick the response that feels most like your natural instinct. There\'s no right answer — just notice what feels true for you.</p>' +
    '</div>' +
    '<button class="btn" id="toCh1">Begin Chapter 1</button>' +
    '</div>';
}

function renderCh1(){
  var sc = CHAPTER1_SCENARIOS[state.ch1Index];
  var html = '<div class="card">';
  html += '<h2>Scenario ' + (state.ch1Index+1) + ' of ' + CHAPTER1_SCENARIOS.length + '</h2>';
  html += '<p>' + esc(sc.prompt) + '</p>';
  html += '<div class="choice-list" role="radiogroup" aria-label="Choose the response closest to your instinct">';
  sc.options.forEach(function(opt, idx){
    html += '<div class="choice" tabindex="0" role="radio" aria-checked="false" data-idx="' + idx + '">' + esc(opt.text) + '</div>';
  });
  html += '</div>';
  html += '</div>';
  return html;
}

function renderCh2Intro(){
  return '<div class="card">' +
    '<div class="intro-box">' +
    '<h3>Chapter 2: Priority Cards</h3>' +
    '<p>Drag each card into the board on the right, ordering them by what matters most to you when you\'re working through something important. Use drag, touch, or the arrow buttons on each card.</p>' +
    '</div>' +
    '<button class="btn" id="toCh2">Begin Chapter 2</button>' +
    '</div>';
}

function renderCh2(){
  var html = '<div class="card">';
  html += '<h2>Arrange by What Matters Most to You</h2>';
  html += '<p>Move cards from the left into the board on the right, top being your highest priority.</p>';
  html += '<div class="drag-area">';
  html += '<div class="zone" id="ch2Pool" data-zone="pool"><div class="zone-title">Unsorted Cards</div>';
  state.ch2Pool.forEach(function(text, idx){
    html += cardItemHTML(text, idx, "pool");
  });
  html += '</div>';
  html += '<div class="zone" id="ch2Board" data-zone="board"><div class="zone-title">Your Priority Order</div>';
  state.ch2Placed.forEach(function(text, idx){
    html += cardItemHTML(text, idx, "board");
  });
  html += '</div>';
  html += '</div>';
  html += '<button class="btn" id="submitCh2" style="margin-top:14px;" ' + (state.ch2Placed.length===PRIORITY_CARDS.length ? "" : "disabled") + '>Continue to Chapter 3</button>';
  html += '</div>';
  return html;
}

function cardItemHTML(text, idx, zone){
  var html = '<div class="card-item" draggable="true" tabindex="0" data-idx="' + idx + '" data-zone="' + zone + '">' + esc(text);
  if(zone==="board"){
    html += '<div class="kb-controls">' +
      '<button type="button" class="kb-btn" data-action="up" data-idx="' + idx + '">↑ Move Up</button>' +
      '<button type="button" class="kb-btn" data-action="down" data-idx="' + idx + '">↓ Move Down</button>' +
      '<button type="button" class="kb-btn" data-action="remove" data-idx="' + idx + '">✕ Remove</button>' +
      '</div>';
  } else {
    html += '<div class="kb-controls"><button type="button" class="kb-btn" data-action="add" data-idx="' + idx + '">＋ Add to Board</button></div>';
  }
  html += '</div>';
  return html;
}

function renderCh3Intro(){
  return '<div class="card">' +
    '<div class="intro-box">' +
    '<h3>Chapter 3: Your Thinking Timeline</h3>' +
    '<p>Drag each step into the timeline in the order you feel it usually happens for you when processing something. There\'s no single correct sequence — just what feels most natural.</p>' +
    '</div>' +
    '<button class="btn" id="toCh3">Begin Chapter 3</button>' +
    '</div>';
}

function renderCh3(){
  var html = '<div class="card">';
  html += '<h2>Build Your Thinking Timeline</h2>';
  html += '<div class="drag-area">';
  html += '<div class="zone" id="ch3Pool" data-zone="pool"><div class="zone-title">Steps</div>';
  state.ch3Pool.forEach(function(step, idx){
    html += '<div class="card-item" draggable="true" tabindex="0" data-idx="' + idx + '" data-zone="pool3" data-step="' + step.id + '">' + esc(step.text) +
      '<div class="kb-controls"><button type="button" class="kb-btn" data-action="place" data-idx="' + idx + '">＋ Place Next Open Slot</button></div></div>';
  });
  html += '</div>';
  html += '<div class="zone" id="ch3Timeline" data-zone="timeline"><div class="zone-title">Timeline</div>';
  html += '<div class="timeline">';
  state.ch3Slots.forEach(function(step, i){
    html += '<div class="slot' + (step ? " filled" : "") + '" data-slot="' + i + '" tabindex="0">' +
      '<span class="slot-index">' + (i+1) + '</span>' +
      '<span>' + (step ? esc(step.text) : '<span class="muted-small">Empty — drop or place a step here</span>') + '</span>';
    if(step){
      html += '<button type="button" class="kb-btn" data-action="clear-slot" data-slot="' + i + '" style="margin-left:auto;">✕</button>';
    }
    html += '</div>';
  });
  html += '</div></div>';
  html += '</div>';
  var filled = state.ch3Slots.filter(function(s){return s;}).length;
  html += '<button class="btn" id="submitCh3" style="margin-top:14px;" ' + (filled===TIMELINE_STEPS.length ? "" : "disabled") + '>Continue to Journal</button>';
  html += '</div>';
  return html;
}

function renderJournal(){
  var html = '<div class="card">';
  html += '<h2>Personalized Reflection Journal</h2>';
  html += '<p>Take a quiet moment with these prompts. There\'s no need to overthink your answers — write whatever comes naturally.</p>';

  html += '<h3 style="margin-top:16px;">When was the last time your mind felt most at ease while deciding something?</h3>';
  html += '<textarea class="journal-textarea" id="journal1" placeholder="Write freely...">' + esc(state.journal.text1) + '</textarea>';

  html += '<h3 style="margin-top:16px;">What does your thinking tend to do when you\'re under pressure?</h3>';
  html += '<textarea class="journal-textarea" id="journal2" placeholder="Write freely...">' + esc(state.journal.text2) + '</textarea>';

  html += '<h3 style="margin-top:16px;">What is one small shift you\'d like to bring to how you think or decide?</h3>';
  html += '<textarea class="journal-textarea" id="journal3" placeholder="Write freely...">' + esc(state.journal.text3) + '</textarea>';

  html += '<button class="btn" id="toReport" style="margin-top:16px;">See My Cognitive Pattern Report</button>';
  html += '</div>';
  return html;
}

function computeBreakdown(){
  var counts = {};
  STYLES.forEach(function(s){ counts[s]=0; });
  state.ch1Answers.forEach(function(s){ counts[s] = (counts[s]||0)+1; });
  var total = state.ch1Answers.length || 1;
  var pct = {};
  STYLES.forEach(function(s){ pct[s] = Math.round((counts[s]/total)*100); });
  return pct;
}

function dominantStyle(pct){
  var best = STYLES[0];
  STYLES.forEach(function(s){ if(pct[s] > pct[best]) best = s; });
  return best;
}

var STYLE_DESCRIPTIONS = {
  "Analytical Thinker":"You tend to approach situations by breaking them into parts, gathering information, and reasoning through details before acting.",
  "Emotional Intuitive":"You tend to lead with feeling — noticing emotional undertones and trusting your instincts as a guide through situations.",
  "Overthinking Loop":"You tend to revisit thoughts repeatedly, turning things over from multiple angles, sometimes longer than feels comfortable.",
  "Action-First Decision Maker":"You tend to move quickly from thought to action, preferring momentum over prolonged deliberation.",
  "Balanced Reflective Thinker":"You tend to blend feeling and reasoning, pausing briefly before moving forward with reasonable confidence."
};

var STYLE_HABITS = {
  "Analytical Thinker":["Set a time limit for research before deciding, to avoid endless analysis.","Pair logic with a quick gut-check before finalizing choices.","Notice when detail-gathering is helping versus delaying."],
  "Emotional Intuitive":["Name the feeling specifically before acting on it.","Pair intuition with one quick practical check.","Give feelings a few minutes to settle before big decisions."],
  "Overthinking Loop":["Set a gentle mental 'stop point' after reflecting once or twice.","Write thoughts down to externalize the loop instead of replaying it internally.","Ask: 'What would I tell a friend in this situation?'"],
  "Action-First Decision Maker":["Pause for one breath before committing to fast decisions.","Revisit decisions briefly afterward to note what worked.","Build in one quick reflection step before acting on impulse."],
  "Balanced Reflective Thinker":["Keep noticing what helps you stay balanced under pressure.","Share your reflective approach with others who might benefit from it.","Continue checking in with both logic and feeling regularly."]
};

function renderReport(){
  var pct = computeBreakdown();
  var dominant = dominantStyle(pct);
  var html = '<div class="card">';
  html += '<h1 style="font-size:1.5rem;">🧭 Your Cognitive Pattern Report</h1>';
  html += '<p class="muted-small">This reflects patterns in how you responded today — not a fixed label or a clinical assessment.</p>';

  html += '<div class="report-section"><h3>Thinking Tendency Breakdown</h3><div class="breakdown">';
  STYLES.forEach(function(s){
    html += '<div class="style-box"><div class="style-name">' + esc(s) + '</div>' +
      '<div class="bar-bg"><div class="bar-fill" style="width:' + pct[s] + '%;"></div></div>' +
      '<div class="style-pct">' + pct[s] + '%</div></div>';
  });
  html += '</div></div>';

  html += '<div class="report-section"><h3>Your Most Present Pattern Today</h3><p><strong style="color:var(--text);">' + esc(dominant) + '</strong> — ' + esc(STYLE_DESCRIPTIONS[dominant]) + '</p></div>';

  html += '<div class="report-section"><h3>Your Priority Order (Chapter 2)</h3><p>';
  state.ch2Placed.forEach(function(t, i){ html += '<span class="tag">' + (i+1) + '. ' + esc(t) + '</span>'; });
  html += '</p></div>';

  html += '<div class="report-section"><h3>Your Thinking Timeline (Chapter 3)</h3><p>';
  state.ch3Slots.forEach(function(step, i){ if(step) html += '<span class="tag">' + (i+1) + '. ' + esc(step.text) + '</span>'; });
  html += '</p></div>';

  html += '<div class="report-section"><h3>From Your Reflection Journal</h3>';
  if(state.journal.text1) html += '<p><em>"' + esc(state.journal.text1) + '"</em></p>';
  if(state.journal.text2) html += '<p><em>"' + esc(state.journal.text2) + '"</em></p>';
  if(state.journal.text3) html += '<p><em>"' + esc(state.journal.text3) + '"</em></p>';
  if(!state.journal.text1 && !state.journal.text2 && !state.journal.text3) html += '<p class="muted-small">No journal entries were written this time.</p>';
  html += '</div>';

  html += '<div class="report-section"><h3>Gentle Habits to Explore</h3><ul>';
  STYLE_HABITS[dominant].forEach(function(h){ html += '<li>' + esc(h) + '</li>'; });
  html += '</ul></div>';

  html += '<p class="muted-small">This tool is for self-reflection only and is not a substitute for professional support. If you\'d like to talk to someone about how you\'re feeling, a counselor or therapist can offer guidance tailored to you.</p>';

  html += '<div class="center"><button class="btn secondary" id="replayBtn">🔁 Replay the Exploration</button></div>';
  html += '</div>';
  return html;
}

/* ================= MAIN RENDER ================= */

function render(){
  document.body.setAttribute("data-mode", state.mode);
  var app = document.getElementById("app");
  var html = renderTopBar() + renderProgress();

  switch(state.step){
    case "welcome": html += renderWelcome(); break;
    case "ch1-intro": html += renderCh1Intro(); break;
    case "ch1": html += renderCh1(); break;
    case "ch2-intro": html += renderCh2Intro(); break;
    case "ch2": html += renderCh2(); break;
    case "ch3-intro": html += renderCh3Intro(); break;
    case "ch3": html += renderCh3(); break;
    case "journal": html += renderJournal(); break;
    case "report": html += renderReport(); break;
  }

  app.innerHTML = html;
  bindEvents();
}

/* ================= EVENT BINDING ================= */

function bindEvents(){
  var calmBtn = document.getElementById("calmModeBtn");
  var stressBtn = document.getElementById("stressModeBtn");
  if(calmBtn) calmBtn.addEventListener("click", function(){ state.mode="calm"; render(); });
  if(stressBtn) stressBtn.addEventListener("click", function(){ state.mode="stress"; render(); });

  var startBtn = document.getElementById("startBtn");
  if(startBtn) startBtn.addEventListener("click", function(){ state.step="ch1-intro"; render(); });

  var toCh1 = document.getElementById("toCh1");
  if(toCh1) toCh1.addEventListener("click", function(){
    state.ch1Index = 0; state.ch1Answers = [];
    state.step = "ch1"; render();
  });

  bindCh1Choices();

  var toCh2 = document.getElementById("toCh2");
  if(toCh2) toCh2.addEventListener("click", function(){
    state.ch2Pool = shuffle(PRIORITY_CARDS.slice());
    state.ch2Placed = [];
    state.step = "ch2"; render();
  });

  bindCh2Events();

  var submitCh2 = document.getElementById("submitCh2");
  if(submitCh2) submitCh2.addEventListener("click", function(){ state.step="ch3-intro"; render(); });

  var toCh3 = document.getElementById("toCh3");
  if(toCh3) toCh3.addEventListener("click", function(){
    state.ch3Pool = shuffle(TIMELINE_STEPS.slice());
    state.ch3Slots = [null,null,null,null,null];
    state.step = "ch3"; render();
  });

  bindCh3Events();

  var submitCh3 = document.getElementById("submitCh3");
  if(submitCh3) submitCh3.addEventListener("click", function(){ state.step="journal"; render(); });

  var j1 = document.getElementById("journal1");
  var j2 = document.getElementById("journal2");
  var j3 = document.getElementById("journal3");
  if(j1) j1.addEventListener("input", function(){ state.journal.text1 = j1.value; });
  if(j2) j2.addEventListener("input", function(){ state.journal.text2 = j2.value; });
  if(j3) j3.addEventListener("input", function(){ state.journal.text3 = j3.value; });

  var toReport = document.getElementById("toReport");
  if(toReport) toReport.addEventListener("click", function(){ state.step="report"; render(); });

  var replayBtn = document.getElementById("replayBtn");
  if(replayBtn) replayBtn.addEventListener("click", function(){
    var mode = state.mode;
    state = {
      mode: mode, step:"welcome", ch1Index:0, ch1Answers:[],
      ch2Pool:[], ch2Placed:[], ch3Pool:[], ch3Slots:[null,null,null,null,null],
      journal:{text1:"",text2:"",text3:""}, dragState:null
    };
    render();
  });
}

/* ---- Chapter 1 choices (click + keyboard) ---- */
function bindCh1Choices(){
  var choices = document.querySelectorAll(".choice");
  choices.forEach(function(el){
    function select(){
      var sc = CHAPTER1_SCENARIOS[state.ch1Index];
      var idx = parseInt(el.getAttribute("data-idx"),10);
      state.ch1Answers.push(sc.options[idx].style);
      state.ch1Index++;
      if(state.ch1Index >= CHAPTER1_SCENARIOS.length){
        state.step = "ch2-intro";
      }
      render();
    }
    el.addEventListener("click", select);
    el.addEventListener("keydown", function(e){
      if(e.key==="Enter" || e.key===" "){ e.preventDefault(); select(); }
    });
  });
}

/* ---- Chapter 2: priority cards drag/drop + keyboard buttons ---- */
function bindCh2Events(){
  var pool = document.getElementById("ch2Pool");
  var board = document.getElementById("ch2Board");

  function setupDrag(container){
    if(!container) return;
    var items = container.querySelectorAll(".card-item");
    items.forEach(function(item){
      item.addEventListener("dragstart", function(e){
        item.classList.add("dragging");
        e.dataTransfer.setData("text/plain", JSON.stringify({idx:item.getAttribute("data-idx"), zone:item.getAttribute("data-zone")}));
      });
      item.addEventListener("dragend", function(){ item.classList.remove("dragging"); });
    });
  }
  setupDrag(pool); setupDrag(board);

  [pool, board].forEach(function(zoneEl){
    if(!zoneEl) return;
    zoneEl.addEventListener("dragover", function(e){ e.preventDefault(); zoneEl.classList.add("dragover"); });
    zoneEl.addEventListener("dragleave", function(){ zoneEl.classList.remove("dragover"); });
    zoneEl.addEventListener("drop", function(e){
      e.preventDefault();
      zoneEl.classList.remove("dragover");
      var data;
      try { data = JSON.parse(e.dataTransfer.getData("text/plain")); } catch(err){ return; }
      var targetZone = zoneEl.getAttribute("data-zone");
      moveCh2Card(data.zone, parseInt(data.idx,10), targetZone);
    });
  });

  var kbBtns = document.querySelectorAll("#ch2Pool .kb-btn, #ch2Board .kb-btn");
  kbBtns.forEach(function(btn){
    btn.addEventListener("click", function(){
      var action = btn.getAttribute("data-action");
      var idx = parseInt(btn.getAttribute("data-idx"),10);
      if(action==="add"){ moveCh2Card("pool", idx, "board"); }
      else if(action==="remove"){ moveCh2Card("board", idx, "pool"); }
      else if(action==="up" && idx>0){
        var tmp = state.ch2Placed[idx-1];
        state.ch2Placed[idx-1] = state.ch2Placed[idx];
        state.ch2Placed[idx] = tmp;
        render();
      } else if(action==="down" && idx < state.ch2Placed.length-1){
        var tmp2 = state.ch2Placed[idx+1];
        state.ch2Placed[idx+1] = state.ch2Placed[idx];
        state.ch2Placed[idx] = tmp2;
        render();
      }
    });
  });
}
function moveCh2Card(fromZone, idx, toZone){
  var sourceArr = fromZone==="pool" ? state.ch2Pool : state.ch2Placed;
  var item = sourceArr[idx];
  if(item===undefined) return;
  sourceArr.splice(idx,1);
  if(toZone==="board") state.ch2Placed.push(item);
  else state.ch2Pool.push(item);
  render();
}

/* ---- Chapter 3: timeline drag/drop + keyboard placement ---- */
function bindCh3Events(){
  var pool = document.getElementById("ch3Pool");
  var timelineSlots = document.querySelectorAll(".slot");

  if(pool){
    var items = pool.querySelectorAll(".card-item");
    items.forEach(function(item){
      item.addEventListener("dragstart", function(e){
        item.classList.add("dragging");
        e.dataTransfer.setData("text/plain", item.getAttribute("data-idx"));
      });
      item.addEventListener("dragend", function(){ item.classList.remove("dragging"); });
    });
  }

  timelineSlots.forEach(function(slotEl){
    slotEl.addEventListener("dragover", function(e){ e.preventDefault(); slotEl.classList.add("dragover"); });
    slotEl.addEventListener("dragleave", function(){ slotEl.classList.remove("dragover"); });
    slotEl.addEventListener("drop", function(e){
      e.preventDefault();
      slotEl.classList.remove("dragover");
      var idx = parseInt(e.dataTransfer.getData("text/plain"),10);
      var slotNum = parseInt(slotEl.getAttribute("data-slot"),10);
      placeStepInSlot(idx, slotNum);
    });
    slotEl.addEventListener("keydown", function(e){
      if(e.key==="Delete" || e.key==="Backspace"){
        var slotNum = parseInt(slotEl.getAttribute("data-slot"),10);
        clearSlot(slotNum);
      }
    });
  });

  var placeBtns = document.querySelectorAll('.kb-btn[data-action="place"]');
  placeBtns.forEach(function(btn){
    btn.addEventListener("click", function(){
      var idx = parseInt(btn.getAttribute("data-idx"),10);
      var openSlot = state.ch3Slots.indexOf(null);
      if(openSlot!==-1) placeStepInSlot(idx, openSlot);
    });
  });

  var clearBtns = document.querySelectorAll('.kb-btn[data-action="clear-slot"]');
  clearBtns.forEach(function(btn){
    btn.addEventListener("click", function(){
      var slotNum = parseInt(btn.getAttribute("data-slot"),10);
      clearSlot(slotNum);
    });
  });
}
function placeStepInSlot(poolIdx, slotNum){
  var step = state.ch3Pool[poolIdx];
  if(step===undefined) return;
  if(state.ch3Slots[slotNum] !== null) return; // slot occupied
  state.ch3Pool.splice(poolIdx,1);
  state.ch3Slots[slotNum] = step;
  render();
}
function clearSlot(slotNum){
  var step = state.ch3Slots[slotNum];
  if(!step) return;
  state.ch3Slots[slotNum] = null;
  state.ch3Pool.push(step);
  render();
}

/* ================= INIT ================= */
render();
})();
</script>
</body>
</html>
